<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#4a6a8a">
  <meta name="description" content="Saisie terrain des mesures radon — CT et CSP">
  <title>Radon — Saisie terrain</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%234a6a8a'/%3E%3Cstop offset='100%25' stop-color='%235b3290'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='96' fill='url(%23g)'/%3E%3Ccircle cx='256' cy='230' r='120' fill='none' stroke='rgba(255,255,255,.25)' stroke-width='6'/%3E%3Ctext x='256' y='255' text-anchor='middle' font-family='Georgia,serif' font-size='120' font-weight='700' fill='%23fff'%3ERn%3C/text%3E%3Ctext x='256' y='310' text-anchor='middle' font-family='sans-serif' font-size='28' fill='rgba(255,255,255,.55)'%3E222%3C/text%3E%3Crect x='96' y='370' width='320' height='4' rx='2' fill='rgba(255,255,255,.15)'/%3E%3Ctext x='256' y='420' text-anchor='middle' font-family='sans-serif' font-size='32' font-weight='600' fill='rgba(255,255,255,.7)'%3EMesurage%3C/text%3E%3Ctext x='256' y='460' text-anchor='middle' font-family='sans-serif' font-size='24' fill='rgba(255,255,255,.4)'%3EActivit%C3%A9 volumique%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%234a6a8a'/%3E%3Cstop offset='100%25' stop-color='%235b3290'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='96' fill='url(%23g)'/%3E%3Ctext x='256' y='290' text-anchor='middle' font-family='Georgia,serif' font-size='180' font-weight='700' fill='%23fff'%3ERn%3C/text%3E%3Ctext x='256' y='380' text-anchor='middle' font-family='sans-serif' font-size='60' font-weight='600' fill='rgba(255,255,255,.5)'%3E222%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- ── Splash screen (app launch) ── -->
  <div id="splash">
    <svg viewBox="0 0 120 120" width="88" height="88" style="filter:drop-shadow(0 2px 12px rgba(0,0,0,.3))">
      <circle cx="60" cy="60" r="56" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.3)" stroke-width="2"/>
      <circle cx="60" cy="60" r="42" fill="rgba(255,255,255,.08)"/>
      <text x="60" y="68" text-anchor="middle" font-family="Georgia,serif" font-size="42" font-weight="700" fill="#fff">Rn</text>
      <text x="60" y="88" text-anchor="middle" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,.5)">222</text>
    </svg>
    <div class="splash-title">Radon — Saisie terrain</div>
    <div class="splash-sub">Mesurage de l'activité volumique</div>
    <div class="splash-loader"></div>
  </div>

  <!-- ── App ── -->
  <div id="app">
    <div id="app-content"></div>
  </div>

  <div id="toast-container"></div>
  <div id="loading-overlay" class="hidden"><div class="spinner"></div></div>

  <script type="module">
    import { initApp, bindGlobalNav } from './js/app.js';

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        await initApp();
        bindGlobalNav();

        // Dismiss splash after init
        const splash = document.getElementById('splash');
        if (splash) {
          setTimeout(() => {
            splash.classList.add('fade-out');
            setTimeout(() => splash.remove(), 400);
          }, 600);
        }
      } catch (err) {
        console.error('Init error:', err);
        const splash = document.getElementById('splash');
        if (splash) splash.remove();
        document.getElementById('app-content').innerHTML = `
          <div class="empty-state">
            <h2>Erreur d'initialisation</h2>
            <p>${err.message}</p>
          </div>
        `;
      }
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
    }
  </script>
</body>
</html>
